name: Deploy web-side

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: web-side-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare release
        id: release
        shell: bash
        run: |
          set -Eeuo pipefail

          RELEASE_ID="$(date -u +'%Y%m%d-%H%M%S')-${GITHUB_SHA::7}"
          ARCHIVE="web-side-${RELEASE_ID}.tar.gz"

          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.tar.gz' \
            -czf "$ARCHIVE" .

          tar -tzf "$ARCHIVE" | grep -Eq '^\./index\.html$|^index\.html$'

          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -Eeuo pipefail

          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan \
            -p "$SSH_PORT" \
            -H "$SSH_HOST" \
            >> ~/.ssh/known_hosts

      - name: Upload release
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          ARCHIVE: ${{ steps.release.outputs.archive }}
        run: |
          set -Eeuo pipefail

          scp \
            -i ~/.ssh/id_ed25519 \
            -P "$SSH_PORT" \
            "$ARCHIVE" \
            "$SSH_USER@$SSH_HOST:/opt/stacks/pixmint-deploy/sites/web-side/incoming/$ARCHIVE"

      - name: Activate release
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          ARCHIVE: ${{ steps.release.outputs.archive }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/id_ed25519 \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "set -Eeuo pipefail;
             pixmint-deploy deploy web-side \
             '/opt/stacks/pixmint-deploy/sites/web-side/incoming/$ARCHIVE' \
             '$RELEASE_ID';
             rm -f \
             '/opt/stacks/pixmint-deploy/sites/web-side/incoming/$ARCHIVE'"

      - name: Show active release
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "cd /tmp && pixmint-deploy releases web-side"
